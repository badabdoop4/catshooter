name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          curl -L -o godot.zip \
            https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_macos.universal.zip
          unzip godot.zip
          chmod +x Godot.app/Contents/MacOS/Godot

      - name: Install Export Templates
        run: |
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/4.6.3.stable"
          curl -L -o templates.tpz \
            https://github.com/godotengine/godot-builds/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          unzip templates.tpz -d templates
          cp -R templates/templates/* \
            "$HOME/Library/Application Support/Godot/export_templates/4.6.3.stable/"

      - name: Clean build folder
        run: rm -rf build && mkdir -p build/ios

      - name: Export Xcode Project
        run: |
          ./Godot.app/Contents/MacOS/Godot \
            --headless \
            --path . \
            --export-release "iOS" \
            build/ios

      - name: Build IPA with Xcode
        run: |
          cd build/ios
          xcodebuild \
            -project *.xcodeproj \
            -scheme catshooter \
            -configuration Release \
            -sdk iphoneos \
            -archivePath catshooter.xcarchive \
            archive

      - name: Export IPA
        run: |
          cd build/ios
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath catshooter.xcarchive \
            -exportPath ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
