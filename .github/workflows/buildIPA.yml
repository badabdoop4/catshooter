name: "Build iOS Application"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Godot Engine & Templates
        uses: ammaraskar/download-godot@v1
        with:
          version: "4.6.3"
          status: "stable"
          platform: "osx"
          templates: true

      - name: Link Export Templates to Local Path
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.6.3.stable
          mv /Users/runner/.local/share/godot/export_templates/4.6.3.stable/* ~/Library/Application\ Support/Godot/export_templates/4.6.3.stable/

      - name: Setup Build Directory
        run: mkdir -p build/ios

      - name: Godot Export to Xcode Project
        run: |
          /Users/runner/Library/Application\ Support/Godot/Godot.app/Contents/MacOS/Godot --headless --path . --export-release "iOS" ./build/ios/project.xcodeproj

      - name: Build IPA via Xcode
        run: |
          cd build/ios
          xcodebuild -project project.xcodeproj -scheme "iOS" -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p build/ios/Payload
          mv build/ios/build/Release-iphoneos/*.app build/ios/Payload/
          cd build/ios && zip -r project.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: build/ios/project.ipa
