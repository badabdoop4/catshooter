name: "Build iOS Application"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Godot Engine
        run: |
          curl -L -o godot.zip "https://github.com"
          unzip godot.zip
          rm godot.zip

      - name: Install Godot Export Templates
        run: |
          curl -L -o templates.tpz "https://github.com"
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.6.3.stable
          unzip templates.tpz -d tmp_templates
          mv tmp_templates/templates/* ~/Library/Application\ Support/Godot/export_templates/4.6.3.stable/
          rm -rf tmp_templates templates.tpz

      - name: Setup Build Directory
        run: mkdir -p build/ios

      - name: Godot Export to Xcode Project
        run: |
          ./Godot.app/Contents/MacOS/Godot --headless --path . --export-release "iOS" ./build/ios/project.xcodeproj

      - name: Build IPA via Xcode
        run: |
          cd build/ios
          xcodebuild -project project.xcodeproj -scheme "iOS" -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p build/ios/Payload
          mv build/ios/build/Release-iphoneos/*.app build/ios/Payload/
          cd build/ios && zip -r project.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: build/ios/project.ipa
