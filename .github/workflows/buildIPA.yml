name: Build iOS

on:
workflow_dispatch:

jobs:
build:
runs-on: macos-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Show files
    run: |
      pwd
      ls -la

  - name: Create export folder
    run: |
      mkdir -p build/ios

  - name: Export
    run: |
      godot --headless \
        --path . \
        --export-release "iOS" \
        build/ios/catshooter.ipa

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: ios-build
      path: build/ios
```
